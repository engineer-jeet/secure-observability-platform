apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: apps

spec:
  replicas: 1

  selector:
    matchLabels:
      app: inventory-service

  template:
    metadata:
      labels:
        app: inventory-service

    spec:
      containers:
      - name: inventory-service

        image: 974318644331.dkr.ecr.us-east-1.amazonaws.com/inventory-service:v5

        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service

metadata:
  name: inventory-service
  namespace: apps

spec:
  selector:
    app: inventory-service

  ports:
  - port: 8080
    targetPort: 8080