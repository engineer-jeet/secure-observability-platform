apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service
  namespace: apps

spec:
  replicas: 1

  selector:
    matchLabels:
      app: checkout-service

  template:
    metadata:
      labels:
        app: checkout-service

    spec:
      containers:
      - name: checkout-service

        image: 974318644331.dkr.ecr.us-east-1.amazonaws.com/checkout-java:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: checkout-service
  namespace: apps

spec:
  selector:
    app: checkout-service

  ports:
  - port: 8080
    targetPort: 8080