apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: regional-apac
  namespace: observability

spec:
  mode: deployment
  replicas: 2

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch: {}

      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25

      resource:
        attributes:
          - action: upsert
            key: region
            value: ap-south-1

          - action: upsert
            key: collector.type
            value: regional

          - action: upsert
            key: collector.name
            value: regional-apac

    exporters:
      otlp:
        endpoint: k8s-observab-gatewayn-4feac2193e-4a75d203133cb573.elb.us-east-1.amazonaws.com:4317
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - resource
            - memory_limiter
            - batch
          exporters:
            - otlp

        metrics:
          receivers:
            - otlp
          processors:
            - resource
            - memory_limiter
            - batch
          exporters:
            - otlp

        logs:
          receivers:
            - otlp
          processors:
            - resource
            - memory_limiter
            - batch
          exporters:
            - otlp

      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888