apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service
  namespace: apps

spec:
  replicas: 1

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:

      - name: order-service

        image: 974318644331.dkr.ecr.us-east-1.amazonaws.com/order-service:v2

        imagePullPolicy: Always

        ports:
          - containerPort: 8000

        env:
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: gateway-collector.observability.svc.cluster.local:4317

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 512Mi

---
apiVersion: v1
kind: Service

metadata:
  name: order-service
  namespace: apps

spec:
  selector:
    app: order-service

  ports:
    - port: 8000
      targetPort: 8000

  type: ClusterIP