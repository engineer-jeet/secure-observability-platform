apiVersion: apps/v1
kind: Deployment

metadata:
  name: ordergen
  namespace: apps

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ordergen

  template:
    metadata:
      labels:
        app: ordergen

    spec:
      containers:

      - name: telemetrygen

        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest

        args:
          - traces
          - --otlp-endpoint=gateway-collector.observability.svc.cluster.local:4317
          - --otlp-insecure
          - --duration=inf
          - --rate=5
          - --service=order-service
          - --telemetry-attributes=order_id="ORD-12345"
          - --telemetry-attributes=order_status="CREATED"
          - --telemetry-attributes=cloud.region="ap-south-1"