apiVersion: apps/v1
kind: Deployment

metadata:
  name: user-service
  namespace: apps

spec:
  replicas: 1

  selector:
    matchLabels:
      app: user-service

  template:

    metadata:
      labels:
        app: user-service

    spec:

      containers:

      - name: user-service

        image: 974318644331.dkr.ecr.us-east-1.amazonaws.com/user-python:v1

        ports:
        - containerPort: 8000

---

apiVersion: v1
kind: Service

metadata:
  name: user-service
  namespace: apps

spec:

  selector:
    app: user-service

  ports:

  - port: 8000
    targetPort: 8000