apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service
  namespace: apps

spec:
  replicas: 1

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
      - name: payment-service

        image: 974318644331.dkr.ecr.us-east-1.amazonaws.com/payment-service:v4

        imagePullPolicy: Always

        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service

metadata:
  name: payment-service
  namespace: apps

spec:
  selector:
    app: payment-service

  ports:
  - port: 3000
    targetPort: 3000

  type: ClusterIP