apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
      - name: telemetrygen

        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest

        args:
          - traces
          - --otlp-endpoint=regional-apac-collector.observability.svc.cluster.local:4317
          - --otlp-insecure
          - --duration=inf
          - --rate=5
          - --service=payment-service