apiVersion: apps/v1
kind: Deployment

metadata:
  name: notification-service
  namespace: apps

spec:
  replicas: 1

  selector:
    matchLabels:
      app: notification-service

  template:

    metadata:
      labels:
        app: notification-service

    spec:

      containers:

      - name: notification-service

        image: 974318644331.dkr.ecr.us-east-1.amazonaws.com/notification-node:v1
        imagePullPolicy: Always

        ports:
        - containerPort: 4000

---

apiVersion: v1
kind: Service

metadata:
  name: notification-service
  namespace: apps

spec:

  selector:
    app: notification-service

  ports:

  - port: 4000
    targetPort: 4000